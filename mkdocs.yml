site_name: MedNexus AI Developer Manual
site_description: Developer manual and technical documentation for MedNexus AI medical multi-agent ecosystem.
site_url: https://mednexus-ai.readthedocs.io/
repo_url: https://github.com/Salman7292/MedNexusAI
repo_name: Salman7292/MedNexusAI

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Running Locally: getting-started/running-locally.md
  - Architecture:
      - 6-Layer Architecture: architecture/overview.md
      - LangGraph Orchestration: architecture/orchestration.md
      - Specialist Personas: architecture/agents.md
      - Pharmacy Pipeline: architecture/pharma-pipeline.md
      - Knowledge Base & RAG: architecture/knowledge-base.md
  - API & Tools Reference:
      - Endpoints (REST & SSE): api-reference/endpoints.md
      - Agent Tools: api-reference/tools.md
      - Python Module Reference: api-reference/code_reference.md
  - Guides:
      - Adding a New Specialty: guides/adding-a-new-specialty.md
      - Running Evaluations: guides/running-evaluations.md
      - Production Deployment: guides/deployment.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
