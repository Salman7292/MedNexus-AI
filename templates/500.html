{% extends "base.html" %}

{% block title %}Server Error - MedNexus AI{% endblock %}

{% block content %}
<section class="py-20 flex items-center justify-center min-h-[calc(100vh-64px)] bg-gray-50 dark:bg-gray-900">
    <div class="max-w-md w-full px-4 sm:px-6 text-center">
        <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8 sm:p-12">
            <div class="mb-8">
                <i class="fas fa-triangle-exclamation text-9xl text-red-100 dark:text-red-900/30"></i>
            </div>

            <h1 class="text-6xl font-extrabold text-gray-900 dark:text-white mb-4 font-display tracking-tight">
                500
            </h1>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-4">Internal Server Error</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-8">
                Oops! Something went wrong on our end. Our medical team has been notified and is working to fix it.
            </p>

            <div class="flex flex-col space-y-3">
                <button onclick="location.reload()"
                    class="w-full inline-flex justify-center items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-standard">
                    <i class="fas fa-rotate-right mr-2"></i> Try Again
                </button>
                <a href="/"
                    class="w-full inline-flex justify-center items-center px-4 py-2 border border-gray-300 dark:border-gray-600 shadow-sm text-sm font-medium rounded-md text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-standard">
                    <i class="fas fa-home mr-2"></i> Return to Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
